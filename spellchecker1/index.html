<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Spell Checker</title>


<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #dce9ff, #ffffff);
    min-height: 100vh;
    padding: 0;
  }

 
  header {
    background: rgba(30, 136, 229, 0.9);
    color: #fff;
    padding: 28px 20px;
    text-align: center;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.25);
  }

  header h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 1px;
  }

 
  .editor-container {
    position: relative;
    width: 90%;
    max-width: 1100px;
    margin: 50px auto;
    padding: 35px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    transition: 0.25s ease;
    animation: fadeIn 0.8s ease;
  }

  .editor-container:hover {
    transform: translateY(-6px);
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.18);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  
  #highlightLayer,
  #wordInput {
    width: 100%;
    height: 300px;
    font-size: 19px;
    line-height: 1.8; 
    padding: 20px;
    border-radius: 18px;
    overflow-wrap: break-word;
    white-space: pre-wrap;
  }

#highlightLayer {
    position: absolute;
    top: 20px;
    left: 20px;

    width: calc(100% - 40px);
    height: calc(300px - 40px);

    padding: 0;
    margin: 0;

    font-size: 19px;
    line-height: 1.8;
    font-family: "Poppins", sans-serif;

    white-space: pre-wrap;
    overflow-wrap: break-word;

    color: transparent;
    pointer-events: none;

    background: none !important;
    border: none !important;
}

  #wordInput {
    position: relative;
    z-index: 2;
    background: transparent;
    border: 2px solid #64b5f6;
    outline: none;
    resize: none;
    color: #2d2d2d;
    transition: 0.25s;
  }

  #wordInput:focus {
    border-color: #1e88e5;
    box-shadow: 0 0 25px rgba(30, 136, 229, 0.4);
  }

 
  #result {
    width: 90%;
    max-width: 900px;
    margin: 20px auto 40px;
    padding: 25px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 14px 35px rgba(0, 0, 0, 0.1);
    font-size: 18px;
    color: #333;
    animation: fadeIn 1s ease;
  }

 
  
 
  footer {
    text-align: center;
    font-size: 14px;
    padding: 20px;
    color: #444;
    margin-top: 30px;
  }
</style>
</head>

<body>

<header>
  <h1>📝  Real-Time Spell Checker</h1>
</header>

<div class="editor-container">
  <div id="highlightLayer"></div>
  <textarea id="wordInput" placeholder="Start typing to check your spelling..."></textarea>
</div>

<div id="result">Your spelling suggestions will appear here...</div>

<footer>
  ©️ 2025 Real-Time Spell Checker | Designed by Team 🚀 🚀
</footer>

<script src="spellcheck.js"></script>

</body>
</html>
